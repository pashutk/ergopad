name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run functional tests
        run: npx playwright test e2e/app.spec.ts

      - name: Run visual tests
        id: visual
        run: npx playwright test e2e/visual.spec.ts
        continue-on-error: true

      - name: Update snapshots
        if: steps.visual.outcome == 'failure'
        run: npx playwright test e2e/visual.spec.ts --update-snapshots

      - name: Commit updated snapshots
        if: steps.visual.outcome == 'failure' && github.event_name == 'pull_request'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/visual.spec.ts-snapshots/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Update visual snapshots"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: steps.visual.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const changed = '${{ steps.commit.outputs.changed }}' === 'true';
            const body = changed
              ? '📸 Visual snapshots were updated — please review the image changes and re-run checks.'
              : '📸 Visual snapshot tests failed (no snapshot changes — likely a rendering error).';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if visual tests failed
        if: steps.visual.outcome == 'failure'
        run: exit 1
